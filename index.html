
<style>
  :root {
    --font-sans: Inter, system-ui, sans-serif;
    --color-text-primary: #1f1f1f;
    --color-text-secondary: #6f6f6f;
    --color-text-tertiary: #8f8f8f;
    --color-background-secondary: #f7f3f3;
    --color-border-tertiary: rgba(0,0,0,0.08);
    --border-radius-lg: 16px;
  }
  body{margin:0;min-height:100vh;background:#f8f8f8;}
  .cw{padding:1.5rem;max-width:720px;margin:0 auto;font-family:var(--font-sans);background:#fff;border-radius:24px;box-shadow:0 24px 60px rgba(0,0,0,0.12)}
  .header{display:flex;align-items:center;gap:14px;justify-content:space-between;margin-bottom:1.5rem}
  .logo{height:48px;width:auto;display:block}
  .logo-link{display:inline-flex;align-items:center}
  .ct{font-size:22px;font-weight:700;color:var(--color-text-primary);margin:0}
  .lang-switch{display:flex;gap:8px;margin-left:auto}
  .lang-btn{border:1px solid rgba(0,0,0,0.12);background:#fff;color:#1f1f1f;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
  .lang-btn.active{background:#C00000;color:#fff;border-color:#C00000}
  .cb{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
  @media(max-width:540px){.cb{grid-template-columns:1fr}}
  .cr{margin-bottom:1.3rem}
  .rt{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
  .rl{font-size:14px;color:var(--color-text-secondary)}
  .rv{font-size:13px;font-weight:500;background:#fdecea;color:var(--color-text-primary);padding:3px 10px;border-radius:6px;min-width:72px;text-align:right;display:inline-flex;align-items:center;justify-content:flex-end}
  input.rv{border:1px solid rgba(0,0,0,0.08);outline:none;width:auto;min-width:88px}
  input[type=range]{width:100%;accent-color:#C00000}
  .trow{display:flex;align-items:center;gap:10px;margin-bottom:1.1rem}
  .tog{position:relative;width:40px;height:22px;flex-shrink:0}
  .tog input{opacity:0;width:0;height:0}
  .tsl{position:absolute;cursor:pointer;inset:0;background:#d4d4d4;border:1px solid #c0c0c0;border-radius:22px;transition:.2s}
  .tsl:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:white;border:1px solid #999;border-radius:50%;transition:.2s}
  input:checked+.tsl{background:#C00000;border-color:#C00000}
  input:checked+.tsl:before{transform:translateX(18px);border-color:#991a00}
  .cs{display:flex;flex-direction:column;align-items:center;gap:1.2rem}
  .dw{position:relative;width:180px;height:180px}
  .dw canvas{width:180px!important;height:180px!important}
  .center-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
  .cl-sub{font-size:10px;color:var(--color-text-tertiary);margin-bottom:2px}
  .cl-val{font-size:16px;font-weight:500;color:#A32D2D}
  .leg{display:flex;gap:14px;font-size:12px;color:var(--color-text-secondary);flex-wrap:wrap;justify-content:center}
  .leg span{display:flex;align-items:center;gap:5px}
  .ld{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .res{width:100%}
  .rr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:14px}
  .rr:last-child{border-bottom:none}
  .rlab{color:var(--color-text-secondary)}
  .rlab.strong{color:var(--color-text-primary);font-weight:500}
  .rval{font-weight:500;color:var(--color-text-primary)}
  .rval.ret{color:#7B1010;font-size:15px}
  .rindent{padding-left:14px;border-left:2px solid var(--color-border-tertiary);margin:2px 0 2px 6px}
  .rindent .rr{padding:5px 0;font-size:13px}
  .rindent .rlab{color:var(--color-text-tertiary)}
  .rindent .rval{color:var(--color-text-secondary);font-weight:400}

  .total-value-summary .rlab{font-size:15px;color:#7B1010;display:flex;align-items:center;gap:6px}
  .total-value-summary .rval{font-size:18px;color:#7B1010}
  .tooltip-icon{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#7B1010;color:white;font-size:13px;font-weight:700;cursor:default;position:relative}
  .tooltip-icon:hover .tooltip-text{opacity:1;visibility:visible;transform:translateX(-50%) translateY(-6px)}
  .tooltip-text{position:absolute;bottom:120%;left:50%;transform:translateX(-50%) translateY(0);background:rgba(0,0,0,0.85);color:white;font-size:11px;line-height:1.4;padding:10px 12px;border-radius:8px;white-space:normal;max-width:260px;min-width:220px;opacity:0;visibility:hidden;transition:opacity .15s ease,transform .15s ease;pointer-events:none;z-index:10}
  .tooltip-text::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border-width:6px;border-style:solid;border-color:rgba(0,0,0,0.85) transparent transparent transparent}
  .btn{width:100%;padding:12px;background:#C00000;color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:.4px;margin-top:.8rem;transition:background .15s;text-decoration:none}
  .btn:hover{background:#991a00}
  .wrap{padding:1.5rem;max-width:640px;margin:0 auto;font-family:var(--font-sans)}
  .section{margin-bottom:1.8rem}
  .sec-title{font-size:13px;font-weight:500;color:#A32D2D;text-transform:uppercase;letter-spacing:.6px;margin:0 0 .8rem}
  .formula-box{background:#fdecea;border-left:3px solid #C00000;border-radius:0 8px 8px 0;padding:1rem 1.2rem;margin-bottom:1rem}
  .formula{font-size:18px;font-weight:500;color:#7B1010;letter-spacing:.5px;margin:0 0 .6rem}
  .vars{display:flex;flex-direction:column;gap:4px}
  .var-row{display:flex;gap:8px;font-size:13px}
  .var-key{color:#A32D2D;font-weight:500;min-width:20px}
  .var-desc{color:var(--color-text-secondary)}
  .steps{display:flex;flex-direction:column;gap:10px}
  .step{display:flex;gap:12px;align-items:flex-start}
  .step-num{width:24px;height:24px;border-radius:50%;background:#C00000;color:white;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

let currentLang = 'ru';

function translatePage() {
  const translationsForLang = translations[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (!key || translationsForLang[key] == null) return;
    el.innerHTML = translationsForLang[key];
  });

  document.getElementById('lang-ru').classList.toggle('active', currentLang === 'ru');
  document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
  document.getElementById('lang-uz').classList.toggle('active', currentLang === 'uz');
  document.getElementById('invest-btn').href = getSiteUrl(currentLang);
}

function getSiteUrl(lang) {
  if (lang === 'en') return 'https://wayll.uz/en';
  if (lang === 'ru') return 'https://wayll.uz/ru';
  return 'https://wayll.uz/uz';
}

function setLanguage(lang) {
  currentLang = lang;
  translatePage();
  update();
}

function clampNum(value, min, max) {
  return Math.min(Math.max(value, min), max);
}

function calc() {
  const invEl    = document.getElementById('v-inv');
  const rateEl   = document.getElementById('v-rate');
  const yrsEl    = document.getElementById('v-yrs');
  const kidsOn   = document.getElementById('t-kids').checked;
  const kidsEl   = document.getElementById('v-kids');
  const inv      = +invEl.value || 0;
  const rate     = (+rateEl.value || 0) / 100;
  const yrs      = +yrsEl.value || 0;
  const kidsMo   = kidsOn ? (+kidsEl.value || 0) : 0;
  const reinv    = document.getElementById('t-reinv').checked;

  let balance = inv, totalKids = 0, totalReturns = 0;
  for (let m = 1; m <= yrs * 12; m++) {
    if (kidsMo > 0) { balance += kidsMo; totalKids += kidsMo; }
    if (m % 6 === 0) {
      const div = balance * (rate / 2) * 0.9;
      totalReturns += div;
      if (reinv) balance += div;
    }
  }
  const totalInvested = inv + totalKids;
  const totalVal = reinv ? balance : (totalInvested + totalReturns);
  return { inv, totalKids: Math.round(totalKids), totalInvested: Math.round(totalInvested), totalReturns: Math.round(totalReturns), totalVal: Math.round(totalVal) };
}

function update(sourceId) {
  const kidsOn = document.getElementById('t-kids').checked;
  const rInv = document.getElementById('r-inv');
  const rRate = document.getElementById('r-rate');
  const rYrs = document.getElementById('r-yrs');
  const rKids = document.getElementById('r-kids');
  const vInv = document.getElementById('v-inv');
  const vRate = document.getElementById('v-rate');
  const vYrs = document.getElementById('v-yrs');
  const vKids = document.getElementById('v-kids');

  if (sourceId === 'r-inv') vInv.value = rInv.value;
  else if (sourceId === 'v-inv') rInv.value = vInv.value;

  if (sourceId === 'r-rate') vRate.value = rRate.value;
  else if (sourceId === 'v-rate') rRate.value = vRate.value;

  if (sourceId === 'r-yrs') vYrs.value = rYrs.value;
  else if (sourceId === 'v-yrs') rYrs.value = vYrs.value;

  if (sourceId === 'r-kids') vKids.value = rKids.value;
  else if (sourceId === 'v-kids') rKids.value = vKids.value;

  vInv.value = clampNum(+vInv.value || 0, +vInv.min, +vInv.max);
  vRate.value = clampNum(+vRate.value || 0, +vRate.min, +vRate.max);
  vYrs.value = clampNum(+vYrs.value || 0, +vYrs.min, +vYrs.max);
  vKids.value = clampNum(+vKids.value || 0, +vKids.min, +vKids.max);

  rInv.value = vInv.value;
  rRate.value = vRate.value;
  rYrs.value = vYrs.value;
  rKids.value = vKids.value;

  const d = calc();
  const t = translations[currentLang];

  document.getElementById('kids-block').style.display = kidsOn ? 'block' : 'none';
  document.getElementById('kl').style.display = kidsOn ? 'flex' : 'none';

  chart.data.datasets[0].data = [d.inv, d.totalKids, d.totalReturns];
  chart.update();

  document.getElementById('cl-val').textContent = fmt(d.totalVal);

  const kidsLine = kidsOn ? `
    <div class="rindent">
      <div class="rr"><span class="rlab">${t.initialCapital}</span><span class="rval">${fmt(d.inv)}</span></div>
      <div class="rr"><span class="rlab">${t.monthlyContributionsLegend}</span><span class="rval">${fmt(d.totalKids)}</span></div>
    </div>` : '';

  document.getElementById('res').innerHTML = `
    <div class="rr"><span class="rlab strong">${t.totalInvested}</span><span class="rval">${fmt(d.totalInvested)}</span></div>
    ${kidsLine}
    <div class="rr"><span class="rlab strong">${t.totalDividends}</span><span class="rval ret">${fmt(d.totalReturns)}</span></div>
    <div class="total-value-summary"><span class="rlab"><span class="tooltip-icon">ⓘ<span class="tooltip-text">${t.tooltipDisclaimer}</span></span></span> ${t.totalValueSummary}<span class="rval">${fmt(d.totalVal)}</span></div>
  `;
}

['r-inv','r-rate','r-yrs','r-kids','v-inv','v-rate','v-yrs','v-kids','t-kids','t-reinv'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => update(id));
});

document.getElementById('lang-ru').addEventListener('click', () => setLanguage('ru'));
document.getElementById('lang-en').addEventListener('click', () => setLanguage('en'));document.getElementById('lang-uz').addEventListener('click', () => setLanguage('uz'));
translatePage();
update();
</script>
